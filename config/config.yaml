vault_path: ./vault

# Universal provider layer — anything speaking the OpenAI-compatible
# /v1/chat/completions protocol works. Flip `providers.<name>.base_url`
# to route through OpenAI, Mistral, Ollama, OpenRouter, vLLM, LM Studio,
# Anthropic-via-proxy, etc. The `echo` provider is built in and never
# calls out — use it for tests and offline demos.
providers:
  mistral:
    base_url: https://api.mistral.ai/v1
    api_key_env: MISTRAL_API_KEY
  openai:
    base_url: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key_env: OPENROUTER_API_KEY
  ollama:
    base_url: http://localhost:11434/v1
    api_key_env: OLLAMA_API_KEY
  # LM Studio — local inference on Mac/Metal via the LM Studio app.
  # Start a model in LM Studio, enable its server (defaults to port 1234),
  # then flip `models.model1.provider` below to `lmstudio` for offline chat.
  lmstudio:
    base_url: http://localhost:1234/v1
    api_key_env: lm-studio   # any string; LM Studio ignores auth
  echo:
    base_url: null
    api_key_env: null

# One model everywhere: Magistral Small is multimodal (text + vision), so a
# single role covers chat, reflection, deep audit, and camera frames. The
# code falls back to `model1` for vision calls when no separate `vision`
# role is configured — exactly what we want here.
models:
  model1:
    provider: mistral
    model: magistral-small-latest
  routine:
    provider: mistral
    model: magistral-small-latest
  deep:
    provider: mistral
    model: magistral-small-latest

retrieval:
  entry_points: 8
  hops: 2
  dense_vault_threshold: 1000
  # Scoring weights must sum to 1.0. `body_bm25` is a lexical score over the
  # full node body — fixes the "answer is in the body but not the title"
  # failure mode that pure graph retrieval can't address.
  weights:
    tag_overlap: 0.30
    keyword_in_title: 0.20
    body_bm25: 0.30
    decay_weight: 0.10
    recency: 0.10
  # Hybrid semantic lens — adds a second seed generator alongside BM25.
  # BM25 catches verbatim recall; embeddings catch paraphrase ("my dog" ↔
  # "Puppet"); wikilinks catch multi-hop. Combined via reciprocal-rank
  # fusion. Requires `pip install sentence-transformers` (or see
  # requirements-embeddings.txt). Disable by flipping to false.
  semantic: true
  semantic_top_k: 10
  semantic_model: sentence-transformers/all-MiniLM-L6-v2

decay:
  # λ=0.02 → ~35-day half-life. Softer than the old λ=0.05 (~14 days) so
  # rare-but-important facts (a birthday, a once-mentioned preference) don't
  # archive just because a month of silence passed. Pair with `pin: true`
  # in frontmatter for facts that must NEVER decay.
  lambda: 0.02
  archive_threshold: 0.10

monitor:
  hub_backlink_limit: 20
  tag_vocabulary_limit: 150
  orphan_ratio_limit: 0.10
  archived_ratio_limit: 0.30
  tension_age_days_limit: 90
  # Nodes with body shorter than this (after stripping headings/whitespace)
  # are considered empty stubs and deleted by /meta's cleanup phase.
  min_body_chars: 20

reflection:
  min_flags_for_reflection: 1
  # Recovery thresholds — when Model 1 emits 0 flags but the transcript is
  # substantive, trigger reflection anyway. Without recovery, rich technical
  # discussions vaporize.
  recovery_min_chars: 150
  recovery_min_user_turns: 2
  # When a new node's title shares this fraction of meaningful tokens with
  # an existing node's title, a duplicate warning is attached to the write.
  # Higher = stricter (fewer warnings). Lower = more cautious.
  duplicate_similarity_threshold: 0.5
  # Max tool-call rounds in /meta before forcing a final answer.
  max_tool_rounds: 8
  # Retry with exponential backoff on rate-limit errors from the provider.
  retry:
    max_retries: 3
    backoff_base_sec: 2.0

session:
  max_context_files: 20
  history_window: 12
  # Agentic Model 1: let the chat model iteratively call memory tools during a
  # turn. Enables multi-hop answers ("citizenship of spouse of author of X")
  # that a single retrieval can't produce. Costs a few extra API calls per
  # complex question; disable for fast/cheap mode.
  agentic_model1: true
  max_tool_rounds: 5

mcp:
  server_name: memory-system
  default_search_limit: 8

# Proactive outreach — Samantha-initiated messages surfaced at TUI startup.
# Disabled by default (explicit opt-in). Every surface is grounded in a
# specific vault node, rate-limited hard, and auditable via
# `vault/_meta/outreach_log.md`.
proactive:
  enabled: true
  daily_cap: 3
  min_score_threshold: 0.55
  min_gap_hours: 4
  min_silence_hours: 2
  quiet_hours: [22, 9]               # [start, end_exclusive] local clock
  timezone: auto
  weights:
    importance: 0.35
    urgency: 0.25
    salience: 0.20
    connection_density: 0.10
    freshness: 0.10

# Second, orthogonal vault — the USER's Obsidian notebook. Samantha writes
# into it on the user's behalf via her obsidian_* tools. These writes are
# NOT memories — reflection, decay, and retrieval never touch this vault.
# Set `path: null` to disable (the obsidian_* tools will be hidden from the
# model's schema entirely).
external_vault:
  path: "/Users/himanshu/Personal /Personal Vault"
  git_auto_commit: true
  audit_log: .meme_audit.log
  protected_folders: []
